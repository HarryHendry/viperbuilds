<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | CreateWithHarry</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
</head>
<body>
<header>
    <div class="logo">
        <img src="/images/logo-2.png">
        
    </div>
  <nav>
   
    <ul>
      <li><a href="/index.html">Home</a></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/projects.html">Projects</a></li>
      <li><a href="/contact.html">Contact</a></li>
    </ul>
  </nav>
</header>
    <section class="contact-container">
        <div class="contact-header">
            <h1>Let's Build Something Great</h1>
            <p>Ready to scale your digital presence? Drop a message below or reach out directly at <a href="mailto:harry@createwithharry.com">harry@createwithharry.com</a>.</p>
        </div>

        <form action="https://formspree.io/f/YOUR_FORMSPREE_ENDPOINT_HERE" method="POST" class="contact-form">
            
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="_replyto" placeholder="your.email@example.com" required>
            </div>

            <div class="form-group">
                <label for="subject">Project Type / Subject</label>
                <select id="subject" name="subject" required>
                    <option value="" disabled selected>Select an option</option>
                    <option value="Digital Marketing">Digital Marketing / Growth</option>
                    <option value="Web Development">Web Development</option>
                    <option value="Data Analytics">Data Analytics / Tracking</option>
                    <option value="Other">Other Inquiry</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">Project Details</label>
                <textarea id="message" name="message" rows="6" placeholder="Tell me about your goals, timeline, and budget..." required></textarea>
            </div>

            <input type="text" name="_gotcha" style="display:none">

            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </section>

</body>
</html>
